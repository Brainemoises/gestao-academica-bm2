<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdos - Instituto BM²</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-graduation-cap me-2"></i>Instituto BM²</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="estudantes.html">Estudantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cursos.html">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="matriculas.html">Matrículas</a></li>
                    <li class="nav-item"><a class="nav-link active" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link" href="exames.html">Exames</a></li>
                    <li class="nav-item"><a class="nav-link" href="pauta.html">Pauta</a></li>
                    <li class="nav-item"><a class="nav-link" href="calendario.html">Calendário</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorio.html">Relatório</a></li>
                    <li class="nav-item"><a class="nav-link" href="github-link.html">GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="fazerLogout()">Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h1><i class="fas fa-video"></i> Conteúdos Acadêmicos</h1>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#conteudoModal" onclick="abrirModalCadastro()">
                    <i class="fas fa-plus"></i> Novo Conteúdo
                </button>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <input type="text" id="searchConteudo" class="form-control" placeholder="🔍 Pesquisar...">
            </div>
            <div class="col-md-3">
                <select id="filtroTipo" class="form-control" onchange="carregarConteudos()">
                    <option value="">Todos os tipos</option>
                    <option value="texto">📄 Texto</option>
                    <option value="aula">📚 Aula</option>
                    <option value="manual">📖 Manual</option>
                    <option value="video">🎥 Vídeo</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="filtroCurso" class="form-control" onchange="carregarConteudos()">
                    <option value="">Todos os cursos</option>
                </select>
            </div>
        </div>

        <div class="row" id="listaConteudos"></div>
    </div>

    <!-- Modal Conteúdo -->
    <div class="modal fade" id="conteudoModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Cadastrar Conteúdo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="conteudoForm">
                        <input type="hidden" id="conteudoId">
                        <div class="mb-3">
                            <label>Título *</label>
                            <input type="text" id="titulo" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Tipo de Conteúdo *</label>
                            <select id="tipo" class="form-control" required onchange="mostrarCampoLink()">
                                <option value="">Selecione...</option>
                                <option value="texto">📄 Texto</option>
                                <option value="aula">📚 Aula</option>
                                <option value="manual">📖 Manual</option>
                                <option value="video">🎥 Vídeo</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Curso</label>
                            <select id="cursoConteudoId" class="form-control">
                                <option value="">Todos os cursos</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Descrição/Conteúdo *</label>
                            <textarea id="descricaoConteudo" class="form-control" rows="5" required></textarea>
                        </div>
                        <div class="mb-3" id="campoLink" style="display:none;">
                            <label>Link do Vídeo/Arquivo</label>
                            <input type="url" id="linkConteudo" class="form-control" placeholder="https://...">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarConteudo()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/conteudos.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = 'index.html';
        if (isEstudante()) window.location.href = 'perfil.html';
        function fazerLogout() { sessionStorage.clear(); localStorage.removeItem('sessao_usuario_bm2'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
