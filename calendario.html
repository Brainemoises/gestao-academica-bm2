<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Acadêmico - Instituto BM²</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <style>
        .data-atual { background: #1e3c72; color: white; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-graduation-cap me-2"></i>Instituto BM²</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="estudantes.html">Estudantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cursos.html">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="matriculas.html">Matrículas</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link" href="exames.html">Exames</a></li>
                    <li class="nav-item"><a class="nav-link" href="pauta.html">Pauta</a></li>
                    <li class="nav-item"><a class="nav-link active" href="calendario.html">Calendário</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorio.html">Relatório</a></li>
                    <li class="nav-item"><a class="nav-link" href="github-link.html">GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="fazerLogout()">Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="data-atual">
                    <i class="fas fa-calendar-day"></i> Data Atual: <strong id="dataAtual"></strong>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-calendar-alt"></i> Calendário Acadêmico</h5>
                    </div>
                    <div class="card-body">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-plus"></i> Adicionar Evento</h5>
                    </div>
                    <div class="card-body">
                        <form id="eventoForm">
                            <input type="text" id="eventoTitulo" class="form-control mb-2" placeholder="Título do evento" required>
                            <input type="date" id="eventoData" class="form-control mb-2" required>
                            <select id="eventoTipo" class="form-control mb-2">
                                <option value="prova">📝 Prova</option>
                                <option value="feriado">🎉 Feriado</option>
                                <option value="evento">📢 Evento</option>
                                <option value="matricula">📋 Matrícula</option>
                            </select>
                            <button type="submit" class="btn btn-success w-100"><i class="fas fa-save"></i> Adicionar</button>
                        </form>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Próximos Eventos</h5>
                    </div>
                    <div class="card-body" id="listaProximosEventos"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/calendario.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = 'index.html';
        function fazerLogout() { sessionStorage.clear(); localStorage.removeItem('sessao_usuario_bm2'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
