<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exames - Instituto BM²</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-graduation-cap me-2"></i>Instituto BM²</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="estudantes.html">Estudantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cursos.html">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="matriculas.html">Matrículas</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="exames.html">Exames</a></li>
                    <li class="nav-item"><a class="nav-link" href="pauta.html">Pauta</a></li>
                    <li class="nav-item"><a class="nav-link" href="calendario.html">Calendário</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorio.html">Relatório</a></li>
                    <li class="nav-item"><a class="nav-link" href="github-link.html">GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="fazerLogout()">Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h1><i class="fas fa-tasks"></i> Sistema de Exames</h1>
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#exameModal" onclick="abrirModalCadastroExame()">
                    <i class="fas fa-plus"></i> Criar Exame
                </button>
            </div>
        </div>

        <div class="row" id="listaExames"></div>
    </div>

    <!-- Modal Exame -->
    <div class="modal fade" id="exameModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Criar Exame</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="exameForm">
                        <input type="hidden" id="exameId">
                        <div class="mb-3">
                            <label>Título do Exame *</label>
                            <input type="text" id="tituloExame" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Curso *</label>
                            <select id="cursoExameId" class="form-control" required></select>
                        </div>
                        <div class="mb-3">
                            <label>Descrição</label>
                            <textarea id="descricaoExame" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Nota Máxima</label>
                            <input type="number" id="notaMaxima" class="form-control" value="10" step="0.5">
                        </div>
                        <hr>
                        <h5><i class="fas fa-question-circle"></i> Questões</h5>
                        <div id="listaQuestoes"></div>
                        <button type="button" class="btn btn-secondary btn-sm mt-2" onclick="adicionarQuestao()">
                            <i class="fas fa-plus"></i> Adicionar Questão
                        </button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarExame()">Salvar Exame</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Realizar Exame -->
    <div class="modal fade" id="realizarExameModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title">Realizar Exame</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="realizarExameBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-success" onclick="corrigirExame()">Corrigir Exame</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Resultado -->
    <div class="modal fade" id="resultadoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Resultado do Exame</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="resultadoBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/exames.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = 'index.html';
        function fazerLogout() { sessionStorage.clear(); localStorage.removeItem('sessao_usuario_bm2'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
