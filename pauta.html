<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pauta de Notas - Instituto BM²</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html"><i class="fas fa-graduation-cap me-2"></i>Instituto BM²</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="estudantes.html">Estudantes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cursos.html">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="matriculas.html">Matrículas</a></li>
                    <li class="nav-item"><a class="nav-link" href="conteudos.html">Conteúdos</a></li>
                    <li class="nav-item"><a class="nav-link" href="exames.html">Exames</a></li>
                    <li class="nav-item"><a class="nav-link active" href="pauta.html">Pauta</a></li>
                    <li class="nav-item"><a class="nav-link" href="calendario.html">Calendário</a></li>
                    <li class="nav-item"><a class="nav-link" href="relatorio.html">Relatório</a></li>
                    <li class="nav-item"><a class="nav-link" href="github-link.html">GitHub</a></li>
                    <li class="nav-item"><a class="nav-link" href="javascript:void(0);" onclick="fazerLogout()">Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="fas fa-chart-bar"></i> Pauta de Notas</h1>
                <p>Sistema de lançamento e consulta de notas</p>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <select id="selectCursoPauta" class="form-control" onchange="carregarPauta()">
                    <option value="">Selecione um curso...</option>
                </select>
            </div>
            <div class="col-md-3">
                <select id="selectDisciplina" class="form-control" onchange="carregarPauta()">
                    <option value="">Todas as disciplinas</option>
                    <option value="Matemática">Matemática</option>
                    <option value="Português">Português</option>
                    <option value="Programação">Programação</option>
                    <option value="Banco de Dados">Banco de Dados</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="selectBimestre" class="form-control" onchange="carregarPauta()">
                    <option value="todas">Todos</option>
                    <option value="1">1º Trimestre</option>
                    <option value="2">2º Trimestre</option>
                    <option value="3">3º Trimestre</option>
                    <option value="4">4º Trimestre</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-success w-100" onclick="exportarPautaExcel()"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped" id="tabelaPauta">
                <thead class="table-dark">
                    <tr><th>Matrícula</th><th>Estudante</th><th>Disciplina</th><th>1º Trim</th><th>2º Trim</th><th>3º Trim</th><th>4º Trim</th><th>Média</th><th>Faltas</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody id="corpoPauta"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pauta.js"></script>
    <script>
        if (!isLoggedIn()) window.location.href = 'index.html';
        if (isEstudante()) window.location.href = 'perfil.html';
        function fazerLogout() { sessionStorage.clear(); localStorage.removeItem('sessao_usuario_bm2'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
